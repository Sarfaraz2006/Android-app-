name: Android CI + APK

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["work"]
    tags: ["v*"]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-merge-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR mergeability
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            let mergeable = null;
            let mergeable_state = null;

            for (let i = 0; i < 8; i++) {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
              mergeable = pr.mergeable;
              mergeable_state = pr.mergeable_state;

              if (mergeable !== null) break;
              await new Promise((r) => setTimeout(r, 3000));
            }

            core.info(`mergeable=${mergeable}, mergeable_state=${mergeable_state}`);

            if (mergeable !== true || ['dirty', 'blocked', 'unknown'].includes(mergeable_state)) {
              core.setFailed(`PR is not mergeable yet (mergeable=${mergeable}, state=${mergeable_state}). Resolve conflicts/check requirements first.`);
            }

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build release APK
        run: gradle assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
